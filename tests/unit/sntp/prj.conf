CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=4096

# ZBus
CONFIG_ZBUS=y

# Networking (required to compile sntp.c which includes <zephyr/net/sntp.h>)
CONFIG_NETWORKING=y
CONFIG_NET_TEST=y
CONFIG_NET_L2_DUMMY=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_DNS_RESOLVER=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# SNTP library disabled — stubs.c provides sntp_simple directly so there is
# no symbol conflict and no real network call is ever made.
CONFIG_SNTP=n

# POSIX timers (for clock_settime in sntp.c)
CONFIG_POSIX_TIMERS=y

# Short retry interval so failure-path tests complete quickly
CONFIG_SNTP_SERVICE_RETRY_INTERVAL_MS=100

# Logging — silence the service to keep test output clean
CONFIG_LOG=y
CONFIG_SNTP_SERVICE_LOG_LEVEL_OFF=y

# Minimal net buffers
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_BUF_RX_COUNT=8
CONFIG_NET_BUF_TX_COUNT=8
