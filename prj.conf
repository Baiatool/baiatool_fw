# NVS
CONFIG_NVS=y
CONFIG_FLASH=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_L2_ETHERNET=y

# WiFi
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=8
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000

# ESP32
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

# ESP32 WiFi
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y

# HTTP client
CONFIG_HTTP_CLIENT=y
CONFIG_DNS_RESOLVER=y

# TLS
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=49152
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256=y
CONFIG_PSA_WANT_KEY_TYPE_RSA_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y

# Net buffers
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_PKT_TX_COUNT=6
CONFIG_NET_BUF_RX_COUNT=12
CONFIG_NET_BUF_TX_COUNT=12
CONFIG_NET_MAX_CONTEXTS=4

# Heap — WPS/wpa_supplicant allocates via k_malloc when this is set;
# 48 KB covers all concurrent WiFi + WPS structs and string buffers.
CONFIG_HEAP_MEM_POOL_SIZE=55576

# Stacks — WiFi needs extra room on ESP32
CONFIG_MAIN_STACK_SIZE=5200
CONFIG_SHELL_STACK_SIZE=1024
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048

# SNTP
CONFIG_SNTP=y
CONFIG_NET_UDP=y

# ZBUS
CONFIG_ZBUS=y

# Shell
CONFIG_SHELL=n
CONFIG_SHELL_BACKEND_SERIAL=n

# Logging
CONFIG_LOG=y
CONFIG_NET_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_POSIX_TIMERS=y
