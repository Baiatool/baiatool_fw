CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

# Display shell for manual screen switching
CONFIG_SHELL_DISPLAY=y

# Display (ST7789V via SPI2 + MIPI DBI)
CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y
CONFIG_ST7789V=y
CONFIG_DISPLAY_LOG_LEVEL_INF=y
CONFIG_MIPI_DBI_LOG_LEVEL_DBG=y

# LVGL
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_VDB_SIZE=5
CONFIG_LV_Z_AUTO_INIT=y